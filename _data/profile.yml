short_bio_text_justify: false
short_bio: >-
  <p>
    I am a PhD student in Artificial Intelligence at the National University of Singapore, supervised by
    <a href="https://www.mornin-feng.com/" target="_blank">Prof. Mengling Feng</a>.
    My research centers on post-training for large (multimodal) language models &mdash; reward design, preference alignment (DPO/RLHF/RLVR), verifier-in-the-loop evaluation &mdash; and agent harnesses that hold up outside the lab. Healthcare is my primary application domain, not the boundary of my research.
  </p>
  <p>
    <strong>Research:</strong> ACL 2026 & EMNLP 2025 main-conference papers, plus two first-author papers under review (ICLR & EMNLP 2026); open datasets and models on Hugging Face with 6K+ downloads.
  </p>
  <p>
    <strong>Open source:</strong> Author of the smart-word-agent &rarr; Office Agent document-agent line: a ReAct tool-calling harness with a rendered-screenshot verification loop; 1K+ downloads in the first week.
  </p>
  <p>
    <strong>Academic Service:</strong> 40+ completed reviews for ACL, NeurIPS, IJCAI, IEEE Affective Computing, ACM TIST; ACL 2026 Main Session Chair.
  </p>

