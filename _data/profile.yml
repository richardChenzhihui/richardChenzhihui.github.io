impact_areas:
  - label: "Post-Training & Alignment"
    title: "Preference data and RL loops for multimodal LLMs"
    description: "MedForge and Med-Banana produce structured preference pairs and failure logs that feed DPO/RLHF post-training pipelines, with Forgery-aware GSPO grounding model reasoning on visual evidence. The data flywheel turns evaluation findings into targeted training signal."
    proof: "ACL 2026 Main · GSPO · 88K alignment-ready pairs"
  - label: "Verifier & Eval Design"
    title: "Evidence-grounded evaluation under domain shift"
    description: "DivScore demonstrates zero-shot verifier design: a normalized-entropy scorer with theoretical guarantees that generalizes across medical and legal domains without domain-specific labels."
    proof: "EMNLP 2025 Main · +14.4% AUROC · +64.0% recall"
  - label: "Agents & Systems"
    title: "Agent harness engineering and serving"
    description: "Smart Word Agent (ReAct, Kimi-K2 core) and an autonomous LangChain trading agent demonstrate end-to-end harness design, tool-calling, and orchestration; quantized serving work targets inference efficiency."
    proof: "1K+ downloads / week 1 · 100+ GitHub stars"

