impact_areas:
  - label: "Post-Training & Alignment"
    title: "Reward design and RL loops for multimodal LLMs"
    description: "V-FIPO extends token-level credit assignment in RLVR from instant visual dependence to future-discounted visual grounding; Forgery-aware GSPO grounds reasoning on visual evidence. Med-Banana's editor–verifier–refiner pipeline turns accepted/rejected trajectories into DPO-ready training signal."
    proof: "ACL 2026 Main · GSPO · V-FIPO (ICLR 2026 sub)"
  - label: "Verifier & Eval Design"
    title: "Evidence-grounded evaluation under domain shift"
    description: "DivScore demonstrates zero-shot verifier design: a normalized-entropy scorer with theoretical guarantees that generalizes across medical and legal domains without domain-specific labels. LLM-as-Judge rubrics drive Med-Banana's quality control."
    proof: "EMNLP 2025 Main · +14.4% AUROC · +64.0% recall"
  - label: "Agents & Systems"
    title: "Agent harnesses with verification loops"
    description: "Office Agent closes the loop on document editing: plan → act → real Word/Excel render → independent visual verifier → targeted repair, with budgeted retries, snapshots/undo, and prompt-injection defense. Plus a LangChain trading agent and quantized serving work."
    proof: "1K+ downloads / week 1 · render-verify-repair loop"

