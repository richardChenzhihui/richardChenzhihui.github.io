short_bio_text_justify: false
short_bio: >-
  <p>
    I am a PhD student in Artificial Intelligence at the National University of Singapore, supervised by
    <a href="https://www.mornin-feng.com/" target="_blank">Prof. Mengling Feng</a>.
    My research centers on post-training methods for large language models &mdash; reward design, preference alignment (DPO/RLHF/RLVR), verifier-in-the-loop evaluation, and agent harness design. Healthcare is my primary application domain, not the boundary of my research.
  </p>
  <p>
    <strong>Research Output:</strong> ACL 2026 & EMNLP 2025 Main; 3 open datasets with 100K+ Hugging Face downloads; preference-alignment data flywheels linking annotation, reward signals, and iterative post-training loops.
  </p>
  <p>
    <strong>Industry:</strong> ByteDance (Singapore) Multimodal Agent RL Research Intern (2026); StepFun Speech-LLM Research Intern (2025); MiniMax Cowork Team Fellowship.
  </p>
  <p>
    <strong>Academic Service:</strong> Reviewer for NeurIPS 2026, IJCAI, IEEE Affective Computing, ACM TIST; ACL 2026 Main Session Chair.
  </p>

hero_kicker: >-
  LLM Post-Training & Agentic AI Research

hero_summary: >-
  I research post-training for large language models &mdash; reward design, preference alignment (DPO/RLHF/RLVR), and verifier-in-the-loop evaluation &mdash; together with multimodal agent harnesses. My work spans RL post-training pipelines, agent trajectory and preference data, and open data infrastructure for alignment research, with high-stakes clinical AI as the primary application domain.

