short_bio: >-
  <p>
    I am a PhD student in Artificial Intelligence at the National University of Singapore, supervised by
    <a href="https://www.mornin-feng.com/" target="_blank">Prof. Mengling Feng</a>. 
    My work builds trustworthy multimodal and agentic AI systems for high-stakes healthcare, connecting publishable research artifacts with deployable evaluation and post-training workflows.
  </p>
  <p>
    <strong>Academic Output:</strong> ACL 2026 Main and EMNLP 2025 Main, with open datasets, models, demos, and code around medical deepfake detection, medical image editing, and specialized-domain LLM detection.
  </p>
  <p>
    <strong>Industry Connection:</strong> TikTok multimodal Agent post-training and MiniMax-supported healthcare AI safety evaluation.
  </p>

