short_bio: >-
  <p>
    我目前是新加坡国立大学人工智能博士生，导师为
    <a href="https://www.mornin-feng.com/" target="_blank">冯梦凌教授</a>。
    我的研究聚焦高风险医疗场景中的可信多模态与 Agentic AI，将可发表的研究资产与可落地的评测、数据和 post-training 工作流连接起来。
  </p>
  <p>
    <strong>学术成果：</strong>ACL 2026 主会议与 EMNLP 2025 主会议论文，围绕医学深度伪造检测、医学图像编辑和专业领域大模型文本检测发布数据、模型、Demo 与代码。
  </p>
  <p>
    <strong>产业连接：</strong>TikTok 多模态 Agent Post-Training 与 MiniMax 支持的医疗 AI 安全评测。
  </p>

