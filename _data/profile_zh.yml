impact_areas:
  - label: "后训练与对齐"
    title: "多模态大模型的奖励设计与 RL 闭环"
    description: "V-FIPO 将 RLVR 的 token 级信用分配从「即时视觉依赖」扩展到「未来折扣视觉锚定」；Forgery-aware GSPO 以视觉证据约束模型推理；Med-Banana 的编辑-验证-精炼流程将成功/失败轨迹转化为可直接用于 DPO 的训练信号。"
    proof: "ACL 2026 主会议 · GSPO · V-FIPO（ICLR 2026 在投）"
  - label: "验证器与评测设计"
    title: "领域偏移下的证据驱动评测"
    description: "DivScore 展示零样本验证器设计：一种带理论保证的归一化熵评分器，无需领域特定标注即可泛化至医疗与法律领域。LLM-as-Judge 评分准则驱动 Med-Banana 的质量控制。"
    proof: "EMNLP 2025 主会议 · +14.4% AUROC · +64.0% 召回"
  - label: "Agent 与系统"
    title: "带验证闭环的 Agent 框架"
    description: "Office Agent 打通文档编辑的完整闭环：计划 → 执行 → 真实 Word/Excel 渲染 → 独立视觉验证器 → 定向修复，并内置预算化重试、快照/撤销与提示注入防御；另有 LangChain 交易 Agent 与量化推理部署工作。"
    proof: "首周 1K+ 下载 · 渲染-验证-修复闭环"

