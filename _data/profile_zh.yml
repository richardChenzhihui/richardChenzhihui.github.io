short_bio: >-
  <p>
    我目前是新加坡国立大学人工智能博士生，导师为
    <a href="https://www.mornin-feng.com/" target="_blank">冯梦凌教授</a>。
    我的研究聚焦（多模态）大模型后训练：奖励设计、偏好对齐（DPO/RLHF/RLVR）、验证器闭环评测，以及能在真实场景落地的 Agent 工程。医疗是我的主要应用场景，而非研究边界。
  </p>
  <p>
    <strong>研究：</strong>ACL 2026 与 EMNLP 2025 主会议论文，另有 2 篇一作论文在投（ICLR 与 EMNLP 2026）；在 Hugging Face 开源数据集与模型，累计 6K+ 下载。
  </p>
  <p>
    <strong>开源：</strong>smart-word-agent → Office Agent 文档 Agent 系列作者：ReAct 工具调用框架 + 渲染截图验证闭环，发布首周 1K+ 下载。
  </p>
  <p>
    <strong>学术服务：</strong>为 ACL、NeurIPS、IJCAI、IEEE Affective Computing、ACM TIST 完成 40+ 篇审稿；ACL 2026 主会议 Session Chair。
  </p>

