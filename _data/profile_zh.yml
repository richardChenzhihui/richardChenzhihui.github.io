short_bio_text_justify: false
short_bio: >-
  <p>
    我目前是新加坡国立大学人工智能博士生，导师为
    <a href="https://www.mornin-feng.com/" target="_blank">冯梦凌教授</a>。
    我的研究聚焦大模型后训练方法：奖励设计、偏好对齐（DPO/RLHF/RLVR）、验证器闭环评测与 Agent 工程设计。医疗是我的主要应用场景，而非研究边界。
  </p>
  <p>
    <strong>研究成果：</strong>ACL 2026 与 EMNLP 2025 主会议；3 个开放数据集，Hugging Face 累计 10 万+ 下载；打通标注、奖励信号与迭代后训练闭环的偏好对齐数据飞轮。
  </p>
  <p>
    <strong>产业经历：</strong>字节跳动（新加坡）多模态 Agent 强化学习研发实习（2026）；阶跃星辰语音大模型研发实习（2025）；MiniMax Cowork Team Fellowship。
  </p>
  <p>
    <strong>学术服务：</strong>NeurIPS 2026、IJCAI、IEEE Affective Computing、ACM TIST 审稿人；ACL 2026 主会议 Session Chair。
  </p>

hero_kicker: >-
  大模型后训练与 Agentic AI 研究

hero_summary: >-
  我从事大模型后训练研究——奖励设计、偏好对齐（DPO/RLHF/RLVR）与验证器闭环评测，以及多模态 Agent 工程。研究工作涵盖强化学习后训练流程、Agent 轨迹与偏好数据，以及服务于对齐研究的开放数据基础设施，主要应用场景为高风险临床 AI。

